<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tranqui — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* exact tokens lifted from src/app/globals.css */
    --cream-50:#f5f1e8;
    --cream-100:#faf7f0;
    --cream-200:#ede7d9;

    --sage-100:#dde5e0;
    --sage-200:#c7d3cb;
    --sage-500:#7a9080;
    --sage-700:#5c6f62;

    --coral-100:#f8e0d2;
    --coral-400:#e89b7b;
    --coral-600:#c77855;

    --success:#5a8b6b;
    --warning:#d4a04a;
    --danger:#c9412a;
    --info:#6b8aa8;

    --bg-base:#f5f1e8;
    --bg-elevated:#faf7f0;
    --bg-muted:#ede7d9;

    --text-primary:#2c2a26;
    --text-secondary:#6b6862;
    --text-tertiary:#8a857d;
    --text-inverse:#faf7f0;

    --border:#e6dfce;
    --border-strong:#c7d3cb;

    --font-sans:"Inter","Helvetica Neue",system-ui,-apple-system,sans-serif;
    --font-display:"Fraunces","Inter",serif;
    --font-mono:"JetBrains Mono",ui-monospace,monospace;

    --radius-sm:8px;
    --radius-md:12px;
    --radius-lg:16px;
    --radius-xl:20px;

    --shadow-sm:0 1px 2px rgba(44,42,38,.04);
    --shadow-md:0 4px 14px rgba(44,42,38,.06);
    --shadow-lg:0 16px 40px rgba(44,42,38,.10);

    --ease-out:cubic-bezier(0.16,1,0.3,1);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  body{min-height:100vh;}
  ::selection{background:var(--sage-200);color:var(--text-primary);}
  button{font-family:inherit;font-size:inherit;color:inherit;}
  input,textarea{font-family:inherit;font-size:inherit;color:inherit;}
  a{color:inherit;text-decoration:none;}

  /* shared atoms */
  .display{font-family:var(--font-display);letter-spacing:-0.012em;font-feature-settings:"ss01","ss03";}
  .mono{font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;}

  /* placeholder mono-stripes used sparingly */
  .ph-stripe{
    background-image:repeating-linear-gradient(135deg,
      rgba(122,144,128,.06) 0 1px, transparent 1px 8px);
  }

  /* triage color tokens — re-applied per state */
  [data-triage="urgente"]{
    --tri:var(--danger); --tri-bg:rgba(201,65,42,.08); --tri-bg-strong:rgba(201,65,42,.14); --tri-border:rgba(201,65,42,.28);
  }
  [data-triage="preferente"]{
    --tri:#9b6e1a; --tri-bg:rgba(212,160,74,.10); --tri-bg-strong:rgba(212,160,74,.18); --tri-border:rgba(212,160,74,.32);
  }
  [data-triage="orientativo"]{
    --tri:var(--success); --tri-bg:rgba(90,139,107,.08); --tri-bg-strong:rgba(90,139,107,.14); --tri-border:rgba(90,139,107,.30);
  }

  /* scrollbars on chat */
  .scroll{scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent;}
  .scroll::-webkit-scrollbar{width:8px;height:8px;}
  .scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px;}

  /* fade in */
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fade-up{animation:fadeUp .42s var(--ease-out) both;}

  /* streaming cursor */
  @keyframes blink{0%,40%{opacity:1}50%,100%{opacity:0}}
  .blink{animation:blink 1.1s steps(1) infinite;}

  /* dotted thinking */
  @keyframes pulse-dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  .dot{display:inline-block;width:6px;height:6px;border-radius:99px;background:var(--sage-500);}
  .dot:nth-child(1){animation:pulse-dot 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation:pulse-dot 1.2s ease-in-out .15s infinite;}
  .dot:nth-child(3){animation:pulse-dot 1.2s ease-in-out .30s infinite;}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="screens-marketing.jsx"></script>
  <script type="text/babel" src="screens-app.jsx"></script>
  <script type="text/babel" src="screen-chat.jsx"></script>
  <script type="text/babel" src="screen-booking.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
